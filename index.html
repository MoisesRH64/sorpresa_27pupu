<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleanos ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=JetBrains+Mono:wght@500&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }

        /* ESCENA 1: EL SOBRE */
        #escena-sobre {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000; z-index: 100; cursor: pointer;
        }
        .sobre {
            width: 160px; height: 110px; background: #fff; position: relative;
            border-radius: 8px; box-shadow: 0 0 50px rgba(255,20,147,0.4);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* ESCENA 2: EL REGALO */
        #regalo-final {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fffafb; visibility: hidden; opacity: 0;
            transition: opacity 1.5s; z-index: 1;
        }
        .dedicatoria { position: absolute; top: 7%; width: 100%; text-align: center; z-index: 10; font-family: 'Dancing Script', cursive; color: #d63384; }
        .dedicatoria h1 { font-size: 3.5rem; margin: 0; }
        .dedicatoria p { font-size: 1.4rem; color: #5c4033; max-width: 80%; margin: 10px auto; }
        #canvas { display: block; position: absolute; bottom: 0; left: 0; }
        #timer-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; font-family: 'JetBrains Mono', monospace;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 12px;
            color: #333; z-index: 10; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #music-toggle {
            position: absolute; top: 20px; right: 20px;
            z-index: 20; border: none; border-radius: 999px;
            padding: 10px 14px; font-family: 'JetBrains Mono', monospace;
            background: rgba(214, 51, 132, 0.92); color: #fff;
            box-shadow: 0 6px 16px rgba(0,0,0,0.2); cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="player" style="position: absolute; top: -9999px;"></div>

    <div id="escena-sobre" onclick="iniciar()">
        <div class="sobre">
            <span style="font-size: 2.5rem;">✉️</span>
            <span style="font-size: 0.8rem; color: #d63384; margin-top: 5px; font-family: 'JetBrains Mono';">Toca para abrir</span>
        </div>
    </div>

    <div id="regalo-final">
        <button id="music-toggle" onclick="toggleMusica()">Pausar musica</button>
        <div class="dedicatoria">
            <h1 id="tit"></h1>
            <p id="sub"></p>
        </div>
        <canvas id="canvas"></canvas>
        <div id="timer-container">
            <div style="font-size: 0.8rem; color: #d63384; margin-bottom: 5px;">TIEMPO DE VIDA:</div>
            <div id="timer">Calculando...</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let shouldPlayWhenReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0',
                videoId: 'TTAU7lLDZYU',
                playerVars: { autoplay: 0, controls: 0, loop: 1, playlist: 'TTAU7lLDZYU', playsinline: 1 },
                events: {
                    onReady: () => {
                        if (shouldPlayWhenReady) {
                            player.unMute();
                            player.setVolume(100);
                            player.playVideo();
                        }
                    }
                }
            });
        }

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const musicToggle = document.getElementById('music-toggle');

        function iniciar() {
            shouldPlayWhenReady = true;
            if (player && player.playVideo) {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
            }
            musicToggle.innerText = 'Pausar musica';

            document.getElementById('escena-sobre').style.display = 'none';
            const regalo = document.getElementById('regalo-final');
            regalo.style.visibility = 'visible';
            regalo.style.opacity = '1';

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            dibujarRama(canvas.width / 2, canvas.height, 120, -Math.PI / 2, 12);

            escribir('tit', '¡Feliz Cumpleanos! ❤️', 100, () => {
                escribir('sub', 'Eres la persona mas especial. Que tu vida siga floreciendo con la misma belleza que este arbol.', 50);
            });

            const nacimiento = new Date('2001-04-27T00:00:00');
            setInterval(() => {
                const diff = new Date() - nacimiento;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function toggleMusica() {
            shouldPlayWhenReady = true;
            if (!player || !player.getPlayerState) return;

            const state = player.getPlayerState();
            if (state === YT.PlayerState.PLAYING) {
                player.pauseVideo();
                musicToggle.innerText = 'Reproducir musica';
            } else {
                player.unMute();
                player.setVolume(100);
                player.playVideo();
                musicToggle.innerText = 'Pausar musica';
            }
        }

        function escribir(id, txt, v, cb) {
            let i = 0;
            const el = document.getElementById(id);
            function t() {
                if (i < txt.length) {
                    el.innerHTML += txt.charAt(i);
                    i++;
                    setTimeout(t, v);
                } else if (cb) {
                    cb();
                }
            }
            t();
        }

        function drawHeart(x, y, s) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x - s / 2, y - s / 2, x - s, y + s / 3, x, y + s);
            ctx.bezierCurveTo(x + s, y + s / 3, x + s / 2, y - s / 2, x, y);
            ctx.fillStyle = '#ff4d6d';
            ctx.fill();
        }

        function dibujarRama(x1, y1, len, angle, w) {
            const x2 = x1 + Math.cos(angle) * len;
            const y2 = y1 + Math.sin(angle) * len;
            ctx.beginPath();
            ctx.strokeStyle = '#4e2a1e';
            ctx.lineWidth = w;
            ctx.lineCap = 'round';
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            if (len < 10) {
                drawHeart(x2, y2, 10);
                return;
            }
            setTimeout(() => {
                dibujarRama(x2, y2, len * 0.8, angle - 0.4, w * 0.7);
                dibujarRama(x2, y2, len * 0.8, angle + 0.4, w * 0.7);
            }, 200);
        }
    </script>
</body>
</html>
